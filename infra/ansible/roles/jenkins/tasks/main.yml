- name: Wait for SSH to be ready
  wait_for_connection:
    delay: 10
    timeout: 120

- name: Update dnf cache
  dnf:
    update_cache: yes

- name: Install Java 21
  dnf:
    name: java-21-amazon-corretto-headless
    state: present

- name: Add Jenkins repository
  get_url:
    url: https://pkg.jenkins.io/redhat-stable/jenkins.repo
    dest: /etc/yum.repos.d/jenkins.repo

- name: Import Jenkins RPM key
  rpm_key:
    key: https://pkg.jenkins.io/redhat-stable/jenkins.io-2023.key
    state: present

- name: Install Jenkins
  dnf:
    name: jenkins
    state: present
    update_cache: yes

- name: Install required system packages for Jenkins jobs
  dnf:
    name:
      - python3-pip
      - unzip
      - git
    state: present

- name: Install AWS CLI
  shell: |
    curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
    unzip -o /tmp/awscliv2.zip -d /tmp
    /tmp/aws/install --update
  args:
    creates: /usr/local/bin/aws

- name: Install Terraform
  shell: |
    curl -fsSL https://releases.hashicorp.com/terraform/1.7.5/terraform_1.7.5_linux_amd64.zip \
      -o /tmp/terraform.zip
    unzip -o /tmp/terraform.zip -d /usr/local/bin/
  args:
    creates: /usr/local/bin/terraform

- name: Download Jenkins plugin manager
  get_url:
    url: >-
      https://github.com/jenkinsci/plugin-installation-manager-tool/releases/download/{{ jenkins_plugin_manager_version }}/jenkins-plugin-manager-{{ jenkins_plugin_manager_version }}.jar
    dest: /usr/local/bin/jenkins-plugin-manager.jar
    mode: "0755"

- name: Render Jenkins plugin list
  template:
    src: plugins.txt.j2
    dest: /tmp/jenkins-plugins.txt
    mode: "0644"

- name: Install Jenkins plugins before first start
  command: >-
    java -jar /usr/local/bin/jenkins-plugin-manager.jar
    --war /usr/share/java/jenkins.war
    --plugin-file /tmp/jenkins-plugins.txt
    --plugin-download-directory /var/lib/jenkins/plugins
  args:
    creates: /var/lib/jenkins/.plugins-installed

- name: Mark plugins as installed
  file:
    path: /var/lib/jenkins/.plugins-installed
    state: touch

- name: Render Jenkins Configuration as Code file
  template:
    src: jenkins.yaml.j2
    dest: /var/lib/jenkins/jenkins.yaml
    owner: jenkins
    group: jenkins
    mode: "0644"

- name: Configure Jenkins startup options
  lineinfile:
    path: /etc/sysconfig/jenkins
    regexp: '^JENKINS_JAVA_OPTIONS='
    line: 'JENKINS_JAVA_OPTIONS="-Djenkins.install.runSetupWizard=false -Dcasc.jenkins.config=/var/lib/jenkins/jenkins.yaml"'
    create: true

- name: Configure Jenkins admin credentials for JCasC
  lineinfile:
    path: /etc/sysconfig/jenkins
    regexp: '^{{ item.key }}='
    line: '{{ item.key }}="{{ item.value }}"'
    create: true
  loop:
    - { key: 'JENKINS_ADMIN_USER', value: '{{ jenkins_admin_user }}' }
    - { key: 'JENKINS_ADMIN_PASSWORD', value: '{{ jenkins_admin_password }}' }

- name: Ensure Jenkins plugin directory permissions are correct
  file:
    path: /var/lib/jenkins/plugins
    owner: jenkins
    group: jenkins
    recurse: true
    state: directory

- name: Enable and start Jenkins with automated bootstrap
  systemd:
    name: jenkins
    state: started
    enabled: true