- name: Wait for SSH to be ready
  wait_for_connection:
    delay: 10
    timeout: 120

- name: Update dnf cache
  dnf:
    update_cache: yes

- name: Install Java 21
  dnf:
    name: java-21-amazon-corretto-headless
    state: present

- name: Add Jenkins repository
  get_url:
    url: https://pkg.jenkins.io/redhat-stable/jenkins.repo
    dest: /etc/yum.repos.d/jenkins.repo

- name: Import Jenkins RPM key
  rpm_key:
    key: https://pkg.jenkins.io/redhat-stable/jenkins.io-2023.key
    state: present

- name: Install Jenkins
  dnf:
    name: jenkins
    state: present
    update_cache: yes

- name: Start and enable Jenkins
  systemd:
    name: jenkins
    state: started
    enabled: true

- name: Install required system packages for Jenkins jobs
  dnf:
    name:
      - python3-pip
      - unzip
      - git
    state: present

- name: Install AWS CLI
  shell: |
    curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
    unzip -o /tmp/awscliv2.zip -d /tmp
    /tmp/aws/install --update
  args:
    creates: /usr/local/bin/aws

- name: Install Terraform
  shell: |
    curl -fsSL https://releases.hashicorp.com/terraform/1.7.5/terraform_1.7.5_linux_amd64.zip \
      -o /tmp/terraform.zip
    unzip -o /tmp/terraform.zip -d /usr/local/bin/
  args:
    creates: /usr/local/bin/terraform

- name: Wait for Jenkins to create initial password file
  wait_for:
    path: /var/lib/jenkins/secrets/initialAdminPassword
    timeout: 120

- name: Fetch Jenkins initial admin password
  slurp:
    src: /var/lib/jenkins/secrets/initialAdminPassword
  register: jenkins_password

- name: Print initial admin password
  debug:
    msg: "Jenkins initial password: {{ jenkins_password.content | b64decode }}"